basePath: /api
definitions:
  handlers.CreateComparisonRequest:
    properties:
      afterPath:
        description: 处理后图片路径（必填）
        type: string
      beforePath:
        description: 处理前图片路径（必填）
        type: string
      detectionRunId:
        description: 可选：检测运行ID
        type: string
      diffInfo:
        description: 差异信息（可选）
      imageId:
        description: 图片ID（必填）
        type: string
      remark:
        description: 备注（可选）
        type: string
    type: object
  handlers.CreateDetectionRequest:
    properties:
      confidenceThreshold:
        type: number
      device:
        type: string
      inferenceTimeMs:
        type: integer
      iouThreshold:
        type: number
      items:
        description: 检测项
        items:
          $ref: '#/definitions/models.DetectionItem'
        type: array
      modelName:
        type: string
      modelVersion:
        type: string
      processedFilename:
        type: string
      processedPath:
        type: string
      runId:
        description: 可选：运行ID，用于幂等
        type: string
      sourceFilename:
        type: string
      sourcePath:
        type: string
      summary:
        allOf:
        - $ref: '#/definitions/models.DetectionSummary'
        description: 汇总信息（是否有问题等）
    type: object
  handlers.CreateIssueRequest:
    properties:
      description:
        description: 问题说明（可选）
        type: string
      detectionRunId:
        description: 可选：关联的检测运行ID
        type: string
      imageId:
        description: 图片ID（必填）
        type: string
      type:
        description: 问题类型（必填）
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  handlers.StartDetectRequest:
    properties:
      conf:
        description: 置信度阈值，默认 0.25
        type: number
      device:
        description: 设备：cpu/cuda:0/mps，默认空（由YOLO自动选择）
        type: string
      iou:
        description: IoU 阈值，默认 0.45
        type: number
      modelName:
        description: 模型名称，默认 "yolov8"
        type: string
      modelVersion:
        description: 模型版本，可选
        type: string
      weights:
        description: 模型权重文件路径或名称，默认 yolov8s.pt
        type: string
    type: object
  models.BoundingBox:
    properties:
      height:
        description: 高度（像素）
        type: number
      width:
        description: 宽度（像素）
        type: number
      x:
        description: 左上角X（像素）
        type: number
      "y":
        description: 左上角Y（像素）
        type: number
    type: object
  models.DetectionItem:
    properties:
      bbox:
        allOf:
        - $ref: '#/definitions/models.BoundingBox'
        description: 边界框
      class:
        description: 目标类别名称
        type: string
      classId:
        description: 目标类别ID（如YOLO的类别索引）
        type: integer
      confidence:
        description: 置信度
        type: number
      note:
        description: 可选备注（比如规则命中说明）
        type: string
      polygon:
        description: 可选的分割多边形
        items:
          $ref: '#/definitions/models.PolygonPoint'
        type: array
    type: object
  models.DetectionSummary:
    properties:
      avgScore:
        description: 平均置信度（便于排序/筛选）
        type: number
      hasIssue:
        description: 是否存在问题
        type: boolean
      issueType:
        description: 问题类型（业务定义）
        type: string
      objectCount:
        description: 检测到的目标数量
        type: integer
    type: object
  models.PolygonPoint:
    properties:
      x:
        type: number
      "y":
        type: number
    type: object
  models.Scene:
    properties:
      createdAt:
        description: 创建时间
        type: string
      description:
        description: 场景描述
        type: string
      id:
        type: string
      location:
        description: 场景位置
        type: string
      name:
        description: 场景名称
        type: string
      status:
        description: 场景状态
        type: string
      updatedAt:
        description: 更新时间
        type: string
    type: object
  models.StyleImage:
    properties:
      createdAt:
        description: 创建时间
        type: string
      description:
        description: 样式图描述
        type: string
      filename:
        description: 文件名
        type: string
      id:
        type: string
      name:
        description: 样式图名称
        type: string
      path:
        description: 文件路径
        type: string
      sceneId:
        description: 关联的场景ID
        type: string
      updatedAt:
        description: 更新时间
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@foreignscan.com
    name: API Support
    url: http://www.foreignscan.com/support
  description: ForeignScan后端API服务
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: ForeignScan API
  version: "1.0"
paths:
  /comparisons:
    get:
      consumes:
      - application/json
      description: 支持按图片ID或检测运行ID筛选
      parameters:
      - description: 图片ID
        in: query
        name: imageId
        type: string
      - description: 检测运行ID
        in: query
        name: detectionRunId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 查询对比记录
      tags:
      - comparisons
    post:
      consumes:
      - application/json
      description: 保存源图与处理后图路径，并可选保存差异信息
      parameters:
      - description: 对比信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateComparisonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 创建处理前后对比记录
      tags:
      - comparisons
  /detect/jobs/{id}:
    delete:
      consumes:
      - application/json
      description: 取消任务（支持pending/running/parsing阶段），任务将标记为canceled
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 取消成功
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 未找到任务
          schema:
            additionalProperties: true
            type: object
        "409":
          description: 任务不可取消（已结束）
          schema:
            additionalProperties: true
            type: object
      summary: 取消正在运行的检测任务
      tags:
      - detections
    get:
      consumes:
      - application/json
      description: 前端轮询或SSE，可获取任务进度/状态
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 任务状态
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 未找到任务
          schema:
            additionalProperties: true
            type: object
      summary: 查询推理任务状态
      tags:
      - detections
  /detect/jobs/{id}/stream:
    get:
      description: 通过SSE实时获取任务状态更新，直到任务结束
      parameters:
      - description: 任务ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE事件流
          schema:
            type: string
        "404":
          description: 未找到任务
          schema:
            additionalProperties: true
            type: object
      summary: 订阅检测任务实时进度（SSE）
      tags:
      - detections
  /detections:
    get:
      consumes:
      - application/json
      description: 支持按场景、时间范围、是否有问题、类别等条件筛选检测运行
      parameters:
      - description: 场景ID
        in: query
        name: sceneId
        type: string
      - description: 是否存在问题
        in: query
        name: hasIssue
        type: boolean
      - description: 目标类别名称筛选
        in: query
        name: class
        type: string
      - description: 开始日期（YYYY-MM-DD）
        in: query
        name: start
        type: string
      - description: 结束日期（YYYY-MM-DD）
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功查询检测结果
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 查询检测结果
      tags:
      - detections
  /images:
    get:
      consumes:
      - application/json
      description: 获取系统中所有图片的列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取所有图片列表
      tags:
      - images
  /images/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取特定图片的详细信息
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片详情
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个图片详情
      tags:
      - images
  /images/{id}/detect:
    post:
      consumes:
      - application/json
      description: 由前端点击触发，后端启动异步任务，运行YOLO并写入数据库（单张图片）
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      - description: 推理配置，可选
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.StartDetectRequest'
      produces:
      - application/json
      responses:
        "202":
          description: 任务已启动，返回jobId与初始状态
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
      summary: 前端一键触发单图推理
      tags:
      - detections
  /images/{id}/detections:
    get:
      consumes:
      - application/json
      description: 根据图片ID获取所有检测运行结果（按创建时间倒序）
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取检测结果
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取图片的检测结果列表
      tags:
      - detections
    post:
      consumes:
      - application/json
      description: YOLO推理完成后，向后端写入一次检测运行结果；支持RunID幂等插入，自动更新图片摘要字段
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      - description: 检测结果请求体
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateDetectionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 成功写入检测结果
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 写入图片的检测结果
      tags:
      - detections
  /images/{id}/issues:
    get:
      consumes:
      - application/json
      description: 根据图片ID获取对应问题列表
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个图片的所有问题
      tags:
      - issues
  /images/by-date:
    get:
      consumes:
      - application/json
      description: 获取指定日期上传的所有图片
      parameters:
      - description: '日期 (格式: YYYY-MM-DD)'
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 日期格式错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 根据日期获取图片
      tags:
      - images
  /images/by-date-scene:
    get:
      consumes:
      - application/json
      description: 获取指定日期和场景ID的所有图片
      parameters:
      - description: '日期 (格式: YYYY-MM-DD)'
        in: query
        name: date
        required: true
        type: string
      - description: 场景ID
        in: query
        name: scene_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 根据日期和场景ID获取图片
      tags:
      - images
  /images/filter:
    get:
      consumes:
      - application/json
      description: 按状态（必填）与可选的时间范围（start/end）筛选图片。时间格式支持 YYYY-MM-DD 或 RFC3339（如 2025-11-10T15:00:00Z）。
      parameters:
      - description: 状态（合格/缺陷/未检测）
        in: query
        name: status
        required: true
        type: string
      - description: 起始时间（YYYY-MM-DD 或 RFC3339）
        in: query
        name: start
        type: string
      - description: 结束时间（YYYY-MM-DD 或 RFC3339）
        in: query
        name: end
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取筛选结果
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 根据状态或状态+时间范围筛选图片
      tags:
      - images
  /issues:
    get:
      consumes:
      - application/json
      description: 支持按场景、图片、问题类型筛选
      parameters:
      - description: 场景ID
        in: query
        name: sceneId
        type: string
      - description: 图片ID
        in: query
        name: imageId
        type: string
      - description: 问题类型
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 查询问题列表
      tags:
      - issues
    post:
      consumes:
      - application/json
      description: 新建问题，包含问题类型和说明；自动补充sceneId
      parameters:
      - description: 问题信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateIssueRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 创建问题记录
      tags:
      - issues
  /scenes:
    get:
      consumes:
      - application/json
      description: 获取系统中所有可用的场景列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Scene'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 获取所有场景
      tags:
      - scenes
    post:
      consumes:
      - application/json
      description: 创建一个新的场景
      parameters:
      - description: '场景信息 (name: 场景名称, description: 场景描述, location: 场景位置, status:
          场景状态)'
        in: body
        name: scene
        required: true
        schema:
          $ref: '#/definitions/models.Scene'
      produces:
      - application/json
      responses:
        "201":
          description: 成功创建场景
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 创建新场景
      tags:
      - scenes
  /scenes/{id}:
    delete:
      consumes:
      - application/json
      description: 根据ID删除指定场景
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 成功删除场景
        "404":
          description: 场景不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 删除场景
      tags:
      - scenes
    get:
      consumes:
      - application/json
      description: 根据ID获取单个场景的详细信息
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取场景详情
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 场景不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个场景详情
      tags:
      - scenes
    put:
      consumes:
      - application/json
      description: 根据ID更新指定场景的信息
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新的场景信息
        in: body
        name: scene
        required: true
        schema:
          $ref: '#/definitions/models.Scene'
      produces:
      - application/json
      responses:
        "200":
          description: 成功更新场景
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 场景不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 更新场景信息
      tags:
      - scenes
  /scenes/{id}/detect:
    post:
      consumes:
      - application/json
      description: 由前端点击触发，后端启动异步任务，运行YOLO并写入数据库
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      - description: 推理配置，可选
        in: body
        name: body
        schema:
          $ref: '#/definitions/handlers.StartDetectRequest'
      produces:
      - application/json
      responses:
        "202":
