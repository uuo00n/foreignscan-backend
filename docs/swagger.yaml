basePath: /api
definitions:
  handlers.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
    type: object
  models.Scene:
    properties:
      createdAt:
        description: 创建时间
        type: string
      description:
        description: 场景描述
        type: string
      id:
        type: string
      location:
        description: 场景位置
        type: string
      name:
        description: 场景名称
        type: string
      status:
        description: 场景状态
        type: string
      updatedAt:
        description: 更新时间
        type: string
    type: object
  models.StyleImage:
    properties:
      createdAt:
        description: 创建时间
        type: string
      description:
        description: 样式图描述
        type: string
      filename:
        description: 文件名
        type: string
      id:
        type: string
      name:
        description: 样式图名称
        type: string
      path:
        description: 文件路径
        type: string
      sceneId:
        description: 关联的场景ID
        type: string
      updatedAt:
        description: 更新时间
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@foreignscan.com
    name: API Support
    url: http://www.foreignscan.com/support
  description: ForeignScan后端API服务
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: ForeignScan API
  version: "1.0"
paths:
  /images:
    get:
      consumes:
      - application/json
      description: 获取系统中所有图片的列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取所有图片列表
      tags:
      - images
  /images/{id}:
    get:
      consumes:
      - application/json
      description: 根据ID获取特定图片的详细信息
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片详情
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个图片详情
      tags:
      - images
  /images/{id}/detect:
    get:
      consumes:
      - application/json
      description: 分析图片内容并返回检测结果
      parameters:
      - description: 图片ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功检测图片
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 图片不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 检测图片内容
      tags:
      - images
  /images/by-date:
    get:
      consumes:
      - application/json
      description: 获取指定日期上传的所有图片
      parameters:
      - description: '日期 (格式: YYYY-MM-DD)'
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 日期格式错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 根据日期获取图片
      tags:
      - images
  /images/by-date-scene:
    get:
      consumes:
      - application/json
      description: 获取指定日期和场景ID的所有图片
      parameters:
      - description: '日期 (格式: YYYY-MM-DD)'
        in: query
        name: date
        required: true
        type: string
      - description: 场景ID
        in: query
        name: scene_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取图片列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 根据日期和场景ID获取图片
      tags:
      - images
  /scenes:
    get:
      consumes:
      - application/json
      description: 获取系统中所有可用的场景列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Scene'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: 获取所有场景
      tags:
      - scenes
    post:
      consumes:
      - application/json
      description: 创建一个新的场景
      parameters:
      - description: '场景信息 (name: 场景名称, description: 场景描述, location: 场景位置, status:
          场景状态)'
        in: body
        name: scene
        required: true
        schema:
          $ref: '#/definitions/models.Scene'
      produces:
      - application/json
      responses:
        "201":
          description: 成功创建场景
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 创建新场景
      tags:
      - scenes
  /scenes/{id}:
    delete:
      consumes:
      - application/json
      description: 根据ID删除指定场景
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功删除场景
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 场景不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 删除场景
      tags:
      - scenes
    get:
      consumes:
      - application/json
      description: 根据ID获取单个场景的详细信息
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取场景详情
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 场景不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个场景详情
      tags:
      - scenes
    put:
      consumes:
      - application/json
      description: 根据ID更新指定场景的信息
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新的场景信息
        in: body
        name: scene
        required: true
        schema:
          $ref: '#/definitions/models.Scene'
      produces:
      - application/json
      responses:
        "200":
          description: 成功更新场景
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 场景不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 更新场景信息
      tags:
      - scenes
  /scenes/{id}/images:
    get:
      consumes:
      - application/json
      description: 获取特定场景下的所有图片列表
      parameters:
      - description: 场景ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取场景图片
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取场景下的所有图片
      tags:
      - scenes
      - images
  /scenes/{scene_id}/first-image:
    get:
      consumes:
      - application/json
      description: 根据场景ID获取该场景下的第一张图片
      parameters:
      - description: 场景ID
        in: path
        name: scene_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取场景第一张图片
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 场景不存在或没有图片
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取场景的第一张图片
      tags:
      - scenes
      - images
  /scenes/all/first-images:
    get:
      consumes:
      - application/json
      description: 获取系统中所有场景的第一张图片，用于场景预览展示
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取所有场景的第一张图片
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取所有场景的第一张图片
      tags:
      - scenes
      - images
  /style-images:
    get:
      consumes:
      - application/json
      description: 获取系统中所有可用的样式图片列表
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取样式图片列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取所有样式图片
      tags:
      - style-images
    post:
      consumes:
      - multipart/form-data
      description: 上传新的样式图片并关联到特定场景
      parameters:
      - description: 场景ID
        in: formData
        name: sceneId
        required: true
        type: string
      - description: 样式图文件
        in: formData
        name: file
        required: true
        type: file
      - description: 样式图名称
        in: formData
        name: name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功上传样式图
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 上传样式图
      tags:
      - style-images
  /style-images/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定的样式图及其文件
      parameters:
      - description: 样式图ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 成功删除样式图
        "404":
          description: 样式图不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 删除样式图
      tags:
      - style-images
    get:
      consumes:
      - application/json
      description: 根据ID获取特定样式图片的详细信息
      parameters:
      - description: 样式图ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取样式图
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 样式图不存在
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个样式图
      tags:
      - style-images
    put:
      consumes:
      - application/json
      description: 更新已存在的样式图信息
      parameters:
      - description: 样式图ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新的样式图信息
        in: body
        name: styleImage
        required: true
        schema:
          $ref: '#/definitions/models.StyleImage'
      produces:
      - application/json
      responses:
        "200":
          description: 成功更新样式图
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 样式图不存在
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 更新样式图
      tags:
      - style-images
  /style-images/scene/{sceneId}:
    get:
      consumes:
      - application/json
      description: 获取特定场景下的所有样式图片列表
      parameters:
      - description: 场景ID
        in: path
        name: sceneId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功获取样式图片列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 获取指定场景的所有样式图
      tags:
      - style-images
  /upload:
    post:
      consumes:
      - multipart/form-data
      description: 上传新图片到系统
      parameters:
      - description: 场景ID
        in: formData
        name: scene_id
        required: true
        type: string
      - description: 要上传的图片文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: 成功上传图片
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties: true
            type: object
      summary: 上传图片
      tags:
      - upload
schemes:
- http
swagger: "2.0"
